<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SejmFlow 2026 - Pulpit</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mesh-background"></div>

    <div class="d-flex h-100">
        <!-- Sidebar -->
        <nav class="sidebar d-flex flex-column flex-shrink-0">
            <div class="brand">
                <i data-lucide="activity" color="#3b82f6" size="28"></i>
                <h2 style="font-size: 1.1rem; font-weight: 700; margin:0;">SejmFlow</h2>
            </div>

            <div class="nav-menu d-flex flex-column gap-1">
                <a href="index.html" class="nav-item active">
                    <i data-lucide="layout-dashboard" size="20"></i>
                    <span class="nav-text">Pulpit</span>
                </a>
                <a href="sprint.html" class="nav-item">
                    <i data-lucide="trello" size="20"></i>
                    <span class="nav-text">Sprint Parlamentarny</span>
                </a>
                <a href="tracker.html" class="nav-item">
                    <i data-lucide="scan-face" size="20"></i>
                    <span class="nav-text">Śledź Posła</span>
                </a>
                <a href="backlog.html" class="nav-item">
                    <i data-lucide="list" size="20"></i>
                    <span class="nav-text">Backlog Ustaw</span>
                </a>
            </div>

            <div class="sidebar-footer mt-auto">
                <div class="nav-item justify-content-center opacity-50 cursor-default">
                    <span class="text-xs">v3.0.0 (MPA)</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content flex-grow-1">
            <div class="header-tools">
                <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">
                    <i data-lucide="moon" size="20"></i>
                </button>
            </div>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0">Sala Posiedzeń Sejmu (Live)</h1>
                    <span class="text-xs opacity-70">Sesja nr 42</span>
                </div>

                <!-- Hemicycle -->
                <div class="glass-card mb-4 position-relative d-flex justify-content-center align-items-center"
                    style="min-height: 340px; background: var(--surface-color-heavy);">
                    <div class="hemicycle-container" id="sejm-hemicycle-container">
                        <!-- Dots from JS -->
                    </div>
                </div>

                <!-- Dashboard Grid -->
                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="glass-card mb-4">
                            <div class="section-title">Legislative Pipeline</div>
                            <div class="pipeline-container" id="pipeline-container" style="min-height:100px;">
                                <div class="pipeline-track"
                                    style="position: absolute; top: 50%; width: 100%; height: 2px; background: var(--surface-border); z-index: 0;">
                                </div>
                                <div class="d-flex justify-content-between position-relative z-1">
                                    <div class="pipeline-stage text-center">
                                        <div class="stage-dot completed"></div>
                                        <div class="stage-name">Rząd</div>
                                    </div>
                                    <div class="pipeline-stage text-center">
                                        <div class="stage-dot completed"></div>
                                        <div class="stage-name">Sejm</div>
                                    </div>
                                    <div class="pipeline-stage text-center">
                                        <div class="stage-dot active"></div>
                                        <div class="stage-name">Senat</div>
                                    </div>
                                    <div class="pipeline-stage text-center">
                                        <div class="stage-dot"></div>
                                        <div class="stage-name">Prezydent</div>
                                    </div>
                                </div>
                                <div id="active-legislation-card" class="mt-4"></div>
                            </div>
                        </div>

                        <div class="glass-card">
                            <div class="section-title">Co Rząd Planuje?</div>
                            <div id="gov-plans-list"></div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="glass-card mb-4">
                            <div class="section-title">Ostatnie Głosowanie</div>
                            <div id="voting-biometrics"></div>
                        </div>
                        <div class="glass-card">
                            <div class="section-title">Komisje Live</div>
                            <div class="committees-grid" id="committees-grid"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
