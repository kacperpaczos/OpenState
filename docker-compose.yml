services:
  postgres:
    image: postgres:16-alpine
    container_name: openstate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openstate}
      POSTGRES_USER: ${POSTGRES_USER:-openstate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openstate_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openstate} -d ${POSTGRES_DB:-openstate}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
