<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SejmFlow 2026 - Śledź Posła</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mesh-background"></div>

    <div class="d-flex h-100">
        <!-- Sidebar -->
        <nav class="sidebar d-flex flex-column flex-shrink-0">
            <div class="brand">
                <i data-lucide="activity" color="#3b82f6" size="28"></i>
                <h2 style="font-size: 1.1rem; font-weight: 700; margin:0;">SejmFlow</h2>
            </div>

            <div class="nav-menu d-flex flex-column gap-1">
                <a href="index.html" class="nav-item">
                    <i data-lucide="layout-dashboard" size="20"></i>
                    <span class="nav-text">Pulpit</span>
                </a>
                <a href="sprint.html" class="nav-item">
                    <i data-lucide="trello" size="20"></i>
                    <span class="nav-text">Sprint Parlamentarny</span>
                </a>
                <a href="tracker.html" class="nav-item active">
                    <i data-lucide="scan-face" size="20"></i>
                    <span class="nav-text">Śledź Posła</span>
                </a>
                <a href="backlog.html" class="nav-item">
                    <i data-lucide="list" size="20"></i>
                    <span class="nav-text">Backlog Ustaw</span>
                </a>
            </div>

            <div class="sidebar-footer mt-auto">
                <div class="nav-item justify-content-center opacity-50 cursor-default">
                    <span class="text-xs">v3.0.0 (MPA)</span>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content flex-grow-1">
            <div class="header-tools">
                <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">
                    <i data-lucide="moon" size="20"></i>
                </button>
            </div>

            <div class="container-fluid">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="h3 mb-0">Śledź Posła / Senatora</h1>
                </div>

                <div class="glass-card mb-4">
                    <input type="text" id="mp-search-input" class="form-control"
                        placeholder="Wpisz nazwisko (np. Tusk, Hołownia, Kowalski)..."
                        style="background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border); color: white;">
                </div>

                <div id="mp-tracker-content">
                    <!-- Search Results or Default View injected here -->
                    <div class="text-center opacity-50 mt-5">Wpisz nazwisko powyżej, aby znaleźć polityka.</div>
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
